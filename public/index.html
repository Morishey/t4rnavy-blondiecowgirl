<!DOCTYPE html>
<html lang="en">

<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no, viewport-fit=cover" />
  <title>BlondieCowgirl | Private Access</title>
  <link
    href="https://fonts.googleapis.com/css2?family=Inter:opsz,wght@14..32,300;14..32,400;14..32,600;14..32,700;14..32,800&display=swap"
    rel="stylesheet" />
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0-beta3/css/all.min.css" />
  <script src="https://cdn.tailwindcss.com"></script>
  
  <!-- React & ReactDOM from CDN -->
  <script src="https://cdn.jsdelivr.net/npm/react@18.2.0/umd/react.development.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/react-dom@18.2.0/umd/react-dom.development.js"></script>
  
  <!-- NO Babel standalone - using pre-compiled app.js -->
  
  <style>
    /* ========== ANIMATIONS ========== */
    @keyframes fadeSlideUp {
      0% {
        opacity: 0;
        transform: translateY(20px);
      }
      100% {
        opacity: 1;
        transform: translateY(0);
      }
    }
    @keyframes fadeSlideIn {
      0% {
        opacity: 0;
        transform: translateX(-10px);
      }
      100% {
        opacity: 1;
        transform: translateX(0);
      }
    }
    @keyframes gentlePulse {
      0%, 100% {
        transform: scale(1);
      }
      50% {
        transform: scale(1.02);
      }
    }
    @keyframes floatGlow {
      0% {
        transform: translateY(0px);
        opacity: 0.7;
      }
      100% {
        transform: translateY(-8px);
        opacity: 1;
      }
    }

    .fade-up {
      animation: fadeSlideUp 0.5s ease-out forwards;
    }
    .fade-in {
      animation: fadeSlideIn 0.4s ease-out forwards;
    }
    .animate-float {
      animation: floatGlow 3s infinite alternate ease-in-out;
    }
    .animate-pulse-soft {
      animation: gentlePulse 2s infinite;
    }

    body {
      font-family: 'Inter', sans-serif;
      margin: 0;
      padding: 0;
      min-height: 100vh;
      position: relative;
      background: #0a1928;
      -webkit-tap-highlight-color: transparent;
    }

    /* Full‑screen background image (aerial landscape) */
    .bg-scene {
      position: fixed;
      top: 0;
      left: 0;
      width: 100%;
      height: 100%;
      z-index: -2;
      background-image: url('https://images.unsplash.com/photo-1506905925346-21bda4d32df4?w=1920&h=1080&fit=crop');
      background-size: cover;
      background-position: center;
      background-repeat: no-repeat;
    }

    .bg-blur {
      position: fixed;
      top: 0;
      left: 0;
      width: 100%;
      height: 100%;
      z-index: -1;
      backdrop-filter: blur(12px);
      background: rgba(255, 255, 255, 0.15);
    }

    .bg-tint {
      position: fixed;
      top: 0;
      left: 0;
      width: 100%;
      height: 100%;
      z-index: -1;
      background: linear-gradient(135deg, rgba(0, 0, 0, 0.2) 0%, rgba(0, 0, 0, 0.1) 100%);
      pointer-events: none;
    }

    .glass-card {
      background: rgba(255, 255, 255, 0.7);
      backdrop-filter: blur(12px);
      border: 1px solid rgba(255, 255, 245, 0.3);
      border-radius: 2rem;
      box-shadow: 0 8px 32px rgba(0, 0, 0, 0.1);
    }

    ::-webkit-scrollbar {
      width: 8px;
    }
    ::-webkit-scrollbar-track {
      background: #eef2ff;
    }
    ::-webkit-scrollbar-thumb {
      background: #6366f1;
      border-radius: 10px;
    }

    .payment-card {
      transition: all 0.25s ease;
      cursor: pointer;
      background: white;
      border: 1px solid #e2e8f0;
    }
    .payment-card:hover {
      transform: scale(1.02);
      background: #f8fafc;
      border-color: #6366f1;
      box-shadow: 0 10px 25px -5px rgba(0, 0, 0, 0.1);
    }
    .social-link-card {
      transition: all 0.2s ease;
    }
    .social-link-card:hover {
      transform: translateY(-4px);
      box-shadow: 0 12px 20px -8px rgba(0, 0, 0, 0.15);
    }
    .modal-overlay {
      background: rgba(0, 0, 0, 0.5);
      backdrop-filter: blur(4px);
    }
    .btn-primary {
      background: linear-gradient(135deg, #6366f1, #8b5cf6);
      transition: all 0.2s;
    }
    .btn-primary:hover {
      transform: translateY(-2px);
      box-shadow: 0 10px 20px -5px rgba(99, 102, 241, 0.4);
    }
    .tabs-container {
      display: flex;
      justify-content: center;
      gap: 0.5rem;
      flex-wrap: wrap;
    }
    .tab-button {
      transition: all 0.2s;
    }
    .tab-button.active {
      background: white;
      color: #6366f1;
      border-bottom: 2px solid #6366f1;
      box-shadow: 0 2px 8px rgba(0, 0, 0, 0.05);
    }
  </style>
</head>

<body>
  <!-- Background layers -->
  <div class="bg-scene"></div>
  <div class="bg-blur"></div>
  <div class="bg-tint"></div>

  <div id="root"></div>

  <!-- Load compiled app.js (NO type="text/babel" needed!) -->
  <script src="/app.js"></script>
</body>

</html>
